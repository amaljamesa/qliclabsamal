<div class="canvas-card" [class.chromeless]="chromeless">
  <div class="canvas-header" *ngIf="!chromeless">
    <div class="canvas-header-left">
      <h2>Label Designer</h2>
      <p class="actual-size">{{ actualSizeLabel }}</p>
    </div>
    <div class="canvas-header-right">
      <label class="toggle-label" title="Toggle Grid">
        <input type="checkbox" [(ngModel)]="showGrid" />
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </label>
      <label class="toggle-label" title="Toggle Rulers">
        <input type="checkbox" [(ngModel)]="showRulers" />
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3 3 21"/><path d="M21 9 9 21"/><path d="M21 15 15 21"/></svg>
      </label>
      <div class="zoom-controls">
        <button type="button" class="zoom-btn" (click)="zoomOut()" title="Zoom Out" [disabled]="zoomLevel <= 0.25">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button type="button" class="zoom-percent-btn" (click)="zoomReset()" title="Reset Zoom">{{ zoomPercent }}%</button>
        <button type="button" class="zoom-btn" (click)="zoomIn()" title="Zoom In" [disabled]="zoomLevel >= 3">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="canvas-stage" #canvasContainer>
    <!-- Rulers -->
    <div class="canvas-ruler horizontal-ruler" *ngIf="showRulers">
      <div class="ruler-mark" *ngFor="let mark of rulerMarksHorizontal" [style.left.px]="mark.position">
        <span class="ruler-label">{{ mark.label }}</span>
      </div>
    </div>
    <div class="canvas-ruler vertical-ruler" *ngIf="showRulers">
      <div class="ruler-mark" *ngFor="let mark of rulerMarksVertical" [style.top.px]="mark.position">
        <span class="ruler-label">{{ mark.label }}</span>
      </div>
    </div>

    <div class="canvas-viewport" [class.with-rulers]="showRulers">
      <div
        class="label-surface"
        #canvasArea
        [ngStyle]="canvasStyle"
        (pointerdown)="onCanvasPointerDown()"
        [class.show-grid]="showGrid"
      >
        <!-- Grid lines -->
        <ng-container *ngIf="showGrid">
          <div class="grid-line grid-v" *ngFor="let x of gridLines.vertical" [style.left.px]="x"></div>
          <div class="grid-line grid-h" *ngFor="let y of gridLines.horizontal" [style.top.px]="y"></div>
        </ng-container>

        <!-- Margin guide -->
        <div class="margin-guide" *ngIf="hasMargins" [ngStyle]="marginStyle"></div>

        <!-- Alignment guide lines -->
        <div
          *ngFor="let guide of activeGuides"
          class="snap-guide"
          [class.snap-guide-h]="guide.orientation === 'horizontal'"
          [class.snap-guide-v]="guide.orientation === 'vertical'"
          [ngStyle]="guideStyle(guide)"
        ></div>

        <!-- Elements -->
        <ng-container *ngFor="let element of elements; let index = index; trackBy: trackByElementId">
          <app-label-canvas-item
            *ngIf="element.visible !== false"
            [element]="element"
            [canvasWidth]="canvasRect.width"
            [canvasHeight]="canvasRect.height"
            [selected]="selectedElementId === element.id"
            [locked]="element.locked || false"
            [zIndex]="index + 1"
            [allElements]="elements"
            [zoomLevel]="zoomLevel"
            (positionChange)="onPositionChange($event)"
            (selectedElement)="onSelectElement($event)"
            (resized)="onResize($event)"
            (rotationChange)="onRotationChange($event)"
            (dragGuides)="onDragGuides($event)"
            (imageUpload)="onImageUpload($event)"
            (interactionStart)="onInteractionStart()">
          </app-label-canvas-item>
        </ng-container>
      </div>
    </div>
  </div>

  <p class="canvas-hint" *ngIf="!chromeless">Click to select · Drag to move · Drag corners to resize · Ctrl+Scroll to zoom · Double-click to reset rotation</p>
</div>
