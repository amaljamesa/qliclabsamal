<div class="toolbar-actions">
  <div class="toolbar-group">
    <label class="toolbar-add-label">
      <span>Add Element:</span>
      <select #elementSelect class="toolbar-select" (change)="onAddElement($event); elementSelect.value = ''">
        <option value="" disabled selected>Select element type...</option>
        @for (type of elementTypes; track type) {
          <option [value]="type.type">{{ type.label }}</option>
        }
      </select>
    </label>
  </div>

  <div class="toolbar-group">
    <button class="toolbar-btn" type="button" (click)="onUndo()" [disabled]="!canUndo" title="Undo (Ctrl+Z)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
      Undo
    </button>
    <button class="toolbar-btn" type="button" (click)="onRedo()" [disabled]="!canRedo" title="Redo (Ctrl+Y)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Redo
    </button>
  </div>

  <div class="toolbar-group">
    <button class="toolbar-btn" type="button" (click)="onImportImage()" title="Auto-generate a label from an uploaded picture">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      Generate From Image
    </button>
  </div>

  <div class="toolbar-group">
    <button class="toolbar-btn" type="button" (click)="onExtendedPreview()" title="Open an actual-size preview to fine-tune positions before printing">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 3h6v6"/>
        <path d="M9 21H3v-6"/>
        <path d="M21 3l-7 7"/>
        <path d="M3 21l7-7"/>
      </svg>
      Extended Preview
    </button>
    <button class="toolbar-btn" type="button" (click)="onPreviewPrint()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print Preview
    </button>
    <button class="toolbar-btn save-btn" type="button" (click)="onSaveLayout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Save Layout
    </button>
  </div>
