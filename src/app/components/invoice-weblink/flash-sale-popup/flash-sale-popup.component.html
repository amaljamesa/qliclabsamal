@if (visible && promo) {
  <div class="flash-sale-overlay" (click)="close()">
    <div class="flash-sale-card" (click)="$event.stopPropagation()">
      <button type="button" class="flash-sale-close" aria-label="Close" (click)="close()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      @if (promo.imageUrl) {
        <img class="flash-sale-image" [src]="promo.imageUrl" [alt]="promo.title" />
      } @else {
        <div class="flash-sale-art">
          <span class="flash-sale-title">{{ promo.title }}</span>
          <span class="flash-sale-discount">{{ promo.discountLabel }}</span>
          <span class="flash-sale-window">{{ promo.windowLabel }}</span>
        </div>
      }

      <button type="button" class="flash-sale-cta" (click)="onCtaClick()">{{ promo.ctaLabel }}</button>

      @if (promo.sponsorName) {
        <span class="flash-sale-sponsor">Ad by {{ promo.sponsorName }} · Powered by Qliclabs</span>
      }
    </div>
  </div>
}
