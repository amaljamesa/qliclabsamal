<div class="party-type-wrapper">

  <!-- Header Bar -->
  <div class="catalogue-header-panel">
    <div class="panel-left">
      <span class="panel-title">Party Type</span>
      <button class="view-toggle-btn" (click)="toggleView()" [title]="isCardView ? 'Switch to Table View' : 'Switch to Card View'">
        <ng-container *ngIf="isCardView; else tableIcon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Table View
        </ng-container>
        <ng-template #tableIcon>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Card View
        </ng-template>
      </button>
    </div>
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search"
      class="catalogue-search-input"
    />
  </div>

  <!-- TABLE VIEW -->
  <div *ngIf="!isCardView" class="table-card-container">
    <div class="table-responsive">
      <table class="catalogue-table">
        <thead>
          <tr>
            <th class="id-th">id</th>
            <th>Name</th>
            <th>Short Name</th>
            <th class="actions-th"></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let party of partyTypes">
            <td class="id-td">{{ party.id }}</td>
            <td class="name-td">{{ party.name }}</td>
            <td class="print-td">{{ party.printName }}</td>
            <td class="actions-td">
              <button class="action-dots-btn" (click)="openEditModal(party, $event)" title="Actions">···</button>
            </td>
          </tr>
          <tr *ngIf="partyTypes.length === 0">
            <td colspan="4" class="no-data-cell">No party types found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- CARD VIEW -->
  <div *ngIf="isCardView" class="cards-grid-container">
    <div *ngFor="let party of partyTypes" class="party-item-card">
      <div class="card-id">ID: {{ party.id }}</div>
      <div class="card-icon">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="card-name">{{ party.name }}</div>
      <div class="card-short">{{ party.printName }}</div>
      <div class="card-actions">
        <button class="card-btn edit-btn" (click)="openEditModal(party, $event)">Edit</button>
        <button class="card-btn delete-btn" (click)="deleteParty(party.id, $event)">Delete</button>
      </div>
    </div>
    <div *ngIf="partyTypes.length === 0" class="no-data-cell">No party types found.</div>
  </div>

  <!-- Floating Action Button -->
  <button class="fab-plus-btn" (click)="openAddModal()" title="Add Party Type">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- ADD/EDIT DIALOG MODAL -->
  <div class="modal-backdrop" *ngIf="showModal">
    <div class="modal-card">
      <div class="modal-header">
        <h4 class="modal-title">{{ modalTitle }}</h4>
        <button class="modal-close-btn" (click)="closeModal()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="party-name" class="form-label">Party Type Name *</label>
          <input type="text" id="party-name" [(ngModel)]="partyName" placeholder="e.g. Retailer" class="form-input" required />
        </div>
        <div class="form-group">
          <label for="party-print" class="form-label">Short Name</label>
          <input type="text" id="party-print" [(ngModel)]="partyPrintName" placeholder="e.g. Retailer" class="form-input" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" (click)="closeModal()">Cancel</button>
        <button class="modal-btn save" (click)="savePartyType()">Save</button>
      </div>
    </div>
  </div>

</div>
