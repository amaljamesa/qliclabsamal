<div class="sidebar-container">

  <!-- Top Label -->
  <div class="sidebar-top-label">User</div>

  <nav class="sidebar-nav">
    <ul class="sidebar-menu">
      <ng-container *ngFor="let item of menuItems">

        <!-- Section Label -->
        <li *ngIf="item.section" class="menu-section-label">{{ item.section }}</li>

        <!-- Menu Item -->
        <li *ngIf="!item.section" class="menu-item-wrapper">

          <!-- Item with Submenu -->
          <div
            *ngIf="item.submenu"
            class="menu-item-header"
            [class.expanded]="item.expanded"
            (click)="toggleSubmenu(item)">
            <span class="menu-link-content">
              <span class="menu-icon">
                <ng-container [ngSwitch]="item.icon">
                  <svg *ngSwitchCase="'database'" viewBox="0 0 24 24" class="icon-svg"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
                  <svg *ngSwitchCase="'folder'" viewBox="0 0 24 24" class="icon-svg"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                  <svg *ngSwitchCase="'repeat'" viewBox="0 0 24 24" class="icon-svg"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                  <svg *ngSwitchCase="'book'" viewBox="0 0 24 24" class="icon-svg"><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>
                  <svg *ngSwitchCase="'file-text'" viewBox="0 0 24 24" class="icon-svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                  <svg *ngSwitchCase="'arrow-left-right'" viewBox="0 0 24 24" class="icon-svg"><path d="M7 7L3 11l4 4"/><path d="M3 11h18"/><path d="M17 17l4-4-4-4"/></svg>
                  <svg *ngSwitchCase="'sliders'" viewBox="0 0 24 24" class="icon-svg"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                  <svg *ngSwitchCase="'activity'" viewBox="0 0 24 24" class="icon-svg"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" class="icon-svg"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  <svg *ngSwitchDefault viewBox="0 0 24 24" class="icon-svg"><circle cx="12" cy="12" r="10"/></svg>
                </ng-container>
              </span>
              <span class="menu-name">{{ item.name }}</span>
            </span>
            <svg class="chevron-icon" [class.rotated]="item.expanded" viewBox="0 0 24 24" width="12" height="12">
              <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Item with Route (Link) -->
          <a
            *ngIf="!item.submenu && item.route"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="menu-item-header link-only">
            <span class="menu-link-content">
              <span class="menu-icon">
                <ng-container [ngSwitch]="item.icon">
                  <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" class="icon-svg"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                  <svg *ngSwitchCase="'bar-chart-2'" viewBox="0 0 24 24" class="icon-svg"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                  <svg *ngSwitchDefault viewBox="0 0 24 24" class="icon-svg"><circle cx="12" cy="12" r="10"/></svg>
                </ng-container>
              </span>
              <span class="menu-name">{{ item.name }}</span>
            </span>
          </a>

          <!-- Item without Route and without Submenu (inactive) -->
          <div
            *ngIf="!item.submenu && !item.route"
            class="menu-item-header link-only inactive-item">
            <span class="menu-link-content">
              <span class="menu-icon">
                <ng-container [ngSwitch]="item.icon">
                  <svg *ngSwitchCase="'key'" viewBox="0 0 24 24" class="icon-svg"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                  <svg *ngSwitchCase="'folder'" viewBox="0 0 24 24" class="icon-svg"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                  <svg *ngSwitchCase="'book'" viewBox="0 0 24 24" class="icon-svg"><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>
                  <svg *ngSwitchCase="'bar-chart-2'" viewBox="0 0 24 24" class="icon-svg"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                  <svg *ngSwitchCase="'file-text'" viewBox="0 0 24 24" class="icon-svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                  <svg *ngSwitchCase="'arrow-left-right'" viewBox="0 0 24 24" class="icon-svg"><path d="M7 7L3 11l4 4"/><path d="M3 11h18"/><path d="M17 17l4-4-4-4"/></svg>
                  <svg *ngSwitchCase="'sliders'" viewBox="0 0 24 24" class="icon-svg"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                  <svg *ngSwitchCase="'tool'" viewBox="0 0 24 24" class="icon-svg"><path d="M14.7 7.3l2 2L8.5 17.5l-2-2L14.7 7.3z"/><path d="M20.7 6.3l-3-3a1 1 0 0 0-1.4 0L9 10.6a4 4 0 0 0-1 2.8v1.2L3 19.6v2.8h2.8l5.7-5.7h1.2a4 4 0 0 0 2.8-1l7.3-7.3a1 1 0 0 0 0-1.4z"/></svg>
                  <svg *ngSwitchCase="'activity'" viewBox="0 0 24 24" class="icon-svg"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                  <svg *ngSwitchCase="'briefcase'" viewBox="0 0 24 24" class="icon-svg"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                  <svg *ngSwitchCase="'map-pin'" viewBox="0 0 24 24" class="icon-svg"><path d="M12 21s-6-4.35-6-10a6 6 0 1 1 12 0c0 5.65-6 10-6 10z"/><circle cx="12" cy="11" r="2"/></svg>
                  <svg *ngSwitchCase="'navigation'" viewBox="0 0 24 24" class="icon-svg"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
                  <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" class="icon-svg"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                  <svg *ngSwitchCase="'check-circle'" viewBox="0 0 24 24" class="icon-svg"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                  <svg *ngSwitchCase="'clipboard'" viewBox="0 0 24 24" class="icon-svg"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                  <svg *ngSwitchDefault viewBox="0 0 24 24" class="icon-svg"><circle cx="12" cy="12" r="10"/></svg>
                </ng-container>
              </span>
              <span class="menu-name">{{ item.name }}</span>
            </span>
          </div>

          <!-- Submenu -->
          <ul *ngIf="item.submenu && item.expanded" class="submenu-list">
            <li *ngFor="let sub of item.submenu" class="submenu-item">
              <a
                *ngIf="sub.route"
                [routerLink]="sub.route"
                routerLinkActive="active"
                class="submenu-link">
                <span class="submenu-dot"></span>
                <span class="submenu-name">{{ sub.name }}</span>
              </a>
              <span *ngIf="!sub.route" class="submenu-link inactive-item">
                <span class="submenu-dot"></span>
                <span class="submenu-name">{{ sub.name }}</span>
              </span>
            </li>
          </ul>

        </li>
      </ng-container>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="sidebar-logout">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>Logout</span>
  </div>

</div>

<!-- Floating Collapse Button -->
<button class="collapse-toggle-btn" (click)="onToggleCollapse()" [attr.aria-label]="isCollapsed ? 'Expand Sidebar' : 'Collapse Sidebar'">
  <svg *ngIf="!isCollapsed" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <svg *ngIf="isCollapsed" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
</button>
