<header class="main-header">
  <div class="header-left">
    <div class="welcome-text">
      <span class="welcome-title">Welcome, <strong>test</strong></span>
      <span class="welcome-subtitle">Your subscription ends in <strong>202 day(s).</strong></span>
    </div>
  </div>

  <div class="header-right">
    <button class="header-control" aria-label="Help">Help</button>
    <button class="icon-btn" aria-label="Help icon">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="header-pill" aria-label="Language">en</button>
    <button class="icon-btn" aria-label="Language globe">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 0 1 0 20"/>
      </svg>
    </button>

    <button class="icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>

    <!-- User info block -->
    <button class="user-menu" aria-label="User menu">
      <div class="user-menu-text">
        <div class="user-menu-row">
          <span class="user-menu-name">test</span>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="user-menu-row">
          <span class="user-menu-sub">test1</span>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="user-menu-row">
          <span class="user-menu-extra-text">26-27</span>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
    </button>
  </div>
</header>
